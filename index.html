<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS - NID DATABASE পার্টনার পোর্টাল</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, Helvetica, sans-serif; background: #f4f6f9; min-height: 100vh; }
        .header { background: #0b5ed7; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; }
        .logo { width: 50px; margin-right: 10px; }
        .container { display: flex; flex-direction: row; min-height: calc(100vh - 60px); }
        .sidebar { width: 220px; background: #fff; border-right: 1px solid #ddd; }
        .sidebar ul { list-style: none; }
        .sidebar ul li a { display: block; padding: 12px; text-decoration: none; color: #000; cursor: pointer; }
        .sidebar ul li a:hover { background: #f0f0f0; }
        .content { flex: 1; padding: 20px; }
        .box { background: #fff; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .form-control { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .btn { padding: 10px 20px; background: #0b5ed7; border: none; color: white; cursor: pointer; border-radius: 5px; font-size: 16px; }
        .btn:hover { background: #0949a5; }
        .btn-approve { background: #28a745; }
        .btn-reject { background: #dc3545; }

        #loginContainer { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        #loginForm, #registerForm { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.15); width: 100%; max-width: 400px; text-align: center; }
        #message, #regMessage { margin-top: 15px; font-weight: bold; min-height: 22px; }
        .success { color: green; }
        .error { color: red; }
        #dashboard { display: none; }
        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #0b5ed7; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 15px; color: white; font-size: 18px; }

        .msg-error { 
            color: #c0392b; font-weight: 700; font-size: 17px; text-align: center; 
            margin: 15px 0; padding: 15px; background: #f8d7da; border: 2px solid #f5c6cb; 
            border-radius: 8px; 
        }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { padding: 12px; text-align: left; border: 1px solid #ddd; }
        th { background: #f8f9fa; font-weight: bold; }
        .eye { cursor: pointer; font-size: 22px; color: #0b5ed7; }
    </style>
</head>
<body>

    <!-- লগইন কন্টেইনার -->
    <div id="loginContainer">
        <div>
            <form id="loginForm">
                <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Election_Commission_Logo.svg" alt="লোগো">
                <h3>CMS - NID DATABASE পার্টনার পোর্টাল</h3>
                <input type="text" id="userid" class="form-control" placeholder="ইউজার আইডি" required>
                <input type="password" id="password" class="form-control" placeholder="পাসওয়ার্ড" required>
                <button type="submit" class="btn">লগইন</button>
                <p style="margin-top:15px;">অ্যাকাউন্ট নেই? <a href="#" id="showRegister">রেজিস্টার করুন</a></p>
                <div id="message"></div>
            </form>

            <form id="registerForm" style="display:none;">
                <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Election_Commission_Logo.svg" alt="লোগো">
                <h3>রেজিস্ট্রেশন</h3>
                <input type="text" id="regUserid" class="form-control" placeholder="ইউজার আইডি" required>
                <input type="password" id="regPassword" class="form-control" placeholder="পাসওয়ার্ড" required>
                <button type="submit" class="btn">রেজিস্টার</button>
                <p style="margin-top:15px;"><a href="#" id="showLogin">লগইন পেজে ফিরুন</a></p>
                <div id="regMessage"></div>
            </form>
        </div>
    </div>

    <!-- লোডিং -->
    <div id="loadingOverlay">
        <div style="text-align:center;">
            <div class="spinner"></div>
            <div class="loading-text">প্রক্রিয়া চলছে...</div>
        </div>
    </div>

    <!-- ড্যাশবোর্ড -->
    <div id="dashboard" style="display:none;">
        <div class="header">
            <div style="display:flex;align-items:center;">
                <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Election_Commission_Logo.svg" alt="লোগো">
                <span>CMS - NID DATABASE পার্টনার পোর্টাল</span>
            </div>
            <button class="btn" onclick="logout()">লগআউট</button>
        </div>
        <div class="container">
            <div class="sidebar">
                <ul>
                    <li><a onclick="showForm('nid')">এনআইডি সার্চ</a></li>
                    <li><a onclick="showForm('mobile')">মোবাইল সার্চ</a></li>
                    <li><a onclick="showForm('birth')">জন্ম নিবন্ধন সার্চ</a></li>
                    <li><a onclick="showForm('formno')">ফর্ম নাম্বার</a></li>
                    <li><a onclick="showForm('correction')">সংশোধন অনুমোদন</a></li>
                </ul>
            </div>
            <div class="content">
                <div class="box" id="formArea">
                    <h3>একটি অপশন নির্বাচন করুন</h3>
                </div>
            </div>
        </div>
    </div>

    <script>
        // লগইন + রেজিস্টার
        document.getElementById("showRegister").addEventListener("click", e => { 
            e.preventDefault(); 
            document.getElementById("loginForm").style.display = "none"; 
            document.getElementById("registerForm").style.display = "block"; 
        });
        
        document.getElementById("showLogin").addEventListener("click", e => { 
            e.preventDefault(); 
            document.getElementById("registerForm").style.display = "none"; 
            document.getElementById("loginForm").style.display = "block"; 
        });

        document.getElementById("registerForm").addEventListener("submit", e => {
            e.preventDefault();
            const user = document.getElementById("regUserid").value.trim();
            const pass = document.getElementById("regPassword").value.trim();
            showLoading();
            setTimeout(() => {
                localStorage.setItem("ecUser", JSON.stringify({ userid: user, password: pass }));
                hideLoading();
                document.getElementById("regMessage").innerHTML = `<span class="success">রেজিস্ট্রেশন সফল! লগইন করুন।</span>`;
                setTimeout(() => {
                    document.getElementById("registerForm").style.display = "none";
                    document.getElementById("loginForm").style.display = "block";
                }, 1200);
            }, 800);
        });

        document.getElementById("loginForm").addEventListener("submit", e => {
            e.preventDefault();
            const user = document.getElementById("userid").value.trim();
            const pass = document.getElementById("password").value.trim();
            const stored = JSON.parse(localStorage.getItem("ecUser") || "{}");
            showLoading();
            setTimeout(() => {
                hideLoading();
                if (stored.userid === user && stored.password === pass) {
                    document.getElementById("loginContainer").style.display = "none";
                    document.getElementById("dashboard").style.display = "block";
                } else {
                    document.getElementById("message").innerHTML = `<span class="error">ইউজার আইডি অথবা পাসওয়ার্ড ভুল।</span>`;
                }
            }, 800);
        });

        function showLoading() { document.getElementById("loadingOverlay").style.display = "flex"; }
        function hideLoading() { document.getElementById("loadingOverlay").style.display = "none"; }
        function logout() { location.reload(); }

        function showForm(type) {
            if (type === "correction") {
                showNIDCorrectionSystem();
                return;
            }
            document.getElementById("formArea").innerHTML = "<h3>একটি অপশন নির্বাচন করুন</h3>";
        }

        function backToDefault() {
            showNIDCorrectionSystem();
        }

        // ================== NID Correction System (তোমার নতুন চাওয়া অনুযায়ী) ==================
        function showNIDCorrectionSystem() {
            const html = `
                <button class="btn" onclick="backToDefault()" style="margin-bottom:15px;">← ফিরে যান</button>
                <h3>NID Correction Portal</h3>
                <div style="margin:15px 0; display:flex; gap:10px;">
                    <input id="nidInput" type="text" placeholder="NID দিন (3318210865)" style="flex:1; padding:12px; border:1px solid #ccc; border-radius:8px;">
                    <button class="btn" id="searchBtn">Search</button>
                </div>
                <div id="searchMsg" style="display:none; color:red; margin:10px 0;"></div>
                
                <div id="resultsWrap" style="display:none;">
                    <h4 style="margin:10px 0;">Application List</h4>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Applicant Name</th>
                                <th>NID</th>
                                <th>Status</th>
                                <th>Category</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="mainBody"></tbody>
                    </table>
                </div>
            `;
            document.getElementById("formArea").innerHTML = html;

            document.getElementById('searchBtn').addEventListener('click', () => {
                const nid = document.getElementById('nidInput').value.trim();
                const msg = document.getElementById('searchMsg');

                if (nid !== "3318210865") {
                    msg.textContent = 'কোনো তথ্য পাওয়া যায়নি';
                    msg.style.display = 'block';
                    return;
                }

                msg.style.display = 'none';

                // Application List টেবিল
                const tableHTML = `
                    <tr>
                        <td>NIDCA5001065649</td>
                        <td>আব্দুল্লাহ আল জিহাদ</td>
                        <td>3318210865</td>
                        <td style="color:orange;">Pending</td>
                        <td>Ga</td>
                        <td><span class="eye" onclick="showDetailView()">👁</span></td>
                    </tr>
                `;

                document.getElementById('mainBody').innerHTML = tableHTML;
                document.getElementById('resultsWrap').style.display = 'block';
            });
        }

        // চোখের আইকনে চাপ দিলে Field | Old Value | New Value টেবিল আসবে
        window.showDetailView = function() {
            const detailHTML = `
                <h4 style="margin:15px 0 10px 0;">সংশোধনের বিস্তারিত তথ্য</h4>
                <table>
                    <thead>
                        <tr>
                            <th>Field</th>
                            <th>Old Value</th>
                            <th>New Value</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>নাম (বাংলা)</td><td>মোঃ জিহাদ</td><td>আব্দুল্লাহ আল জিহাদ</td></tr>
                        <tr><td>নাম (ইংরেজি)</td><td>MD. JIHAD</td><td>Abdullah Al Jihad</td></tr>
                    </tbody>
                </table>
                <div style="margin-top:20px; text-align:center;">
                    <button onclick="handleApprove()" class="btn btn-approve" style="margin-right:10px;">Approve</button>
                    <button onclick="handleReject()" class="btn btn-reject">Reject</button>
                </div>
            `;

            document.getElementById("formArea").innerHTML = `
                <button class="btn" onclick="showNIDCorrectionSystem()" style="margin-bottom:15px;">← ফিরে যান</button>
                ${detailHTML}
            `;
        };

        window.handleApprove = function() {
            const msg = document.createElement('div');
            msg.className = 'msg-error';
            msg.textContent = 'দুঃখিত, এটি আপনি তদন্ত ছাড়া অনুমোদন করতে পারবেন না।';
            document.getElementById("formArea").appendChild(msg);
        };

        window.handleReject = function() {
            const msg = document.createElement('div');
            msg.className = 'msg-error';
            msg.textContent = 'আবেদনটি প্রত্যাখ্যান করা হয়েছে।';
            document.getElementById("formArea").appendChild(msg);
        };
    </script>
</body>
</html>
